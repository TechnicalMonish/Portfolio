<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monish — Coming Soon</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap");
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --p: #00f0ff;
        --s: #ff2d75;
        --a: #b14aed;
        --d: #06060e;
        --g: 0 0 20px rgba(0, 240, 255, 0.5), 0 0 60px rgba(0, 240, 255, 0.2);
      }
      body {
        background: var(--d);
        color: #fff;
        font-family: "Rajdhani", sans-serif;
        overflow: hidden;
        height: 100vh;
        cursor: none;
      }
      .cur {
        width: 20px;
        height: 20px;
        border: 2px solid var(--p);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 10000;
        transition:
          transform 0.15s,
          background 0.15s;
        mix-blend-mode: difference;
      }
      .curd {
        width: 6px;
        height: 6px;
        background: var(--s);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 10001;
      }
      .cur.active {
        transform: scale(2.5);
        background: rgba(0, 240, 255, 0.15);
      }
      .curt {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        border-radius: 50%;
        background: var(--p);
        opacity: 0;
      }
      #pc,
      #gc {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }
      #gc {
        opacity: 0.05;
      }
      .scan {
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 240, 255, 0.01) 2px,
          rgba(0, 240, 255, 0.01) 4px
        );
        pointer-events: none;
        z-index: 1;
      }
      .vig {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          transparent 40%,
          rgba(0, 0, 0, 0.8) 100%
        );
        pointer-events: none;
        z-index: 1;
      }
      .bo {
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.1;
        pointer-events: none;
        z-index: 0;
        animation: of 14s ease-in-out infinite;
      }
      .bo:nth-child(1) {
        width: 500px;
        height: 500px;
        background: var(--p);
        top: -10%;
        left: -10%;
      }
      .bo:nth-child(2) {
        width: 400px;
        height: 400px;
        background: var(--s);
        bottom: -10%;
        right: -10%;
        animation-delay: -5s;
      }
      .bo:nth-child(3) {
        width: 350px;
        height: 350px;
        background: var(--a);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-delay: -9s;
      }
      @keyframes of {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -40px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 30px) scale(0.9);
        }
      }
      .kf {
        position: fixed;
        font-size: clamp(4rem, 10vw, 10rem);
        opacity: 0.025;
        font-weight: 900;
        pointer-events: none;
        animation: kd 25s ease-in-out infinite;
        z-index: 0;
      }
      .kf:nth-child(1) {
        top: 8%;
        left: 3%;
        color: var(--p);
      }
      .kf:nth-child(2) {
        top: 55%;
        right: 3%;
        color: var(--s);
        animation-delay: -8s;
      }
      .kf:nth-child(3) {
        bottom: 8%;
        left: 12%;
        color: var(--a);
        animation-delay: -16s;
      }
      .kf:nth-child(4) {
        top: 30%;
        right: 15%;
        color: var(--p);
        animation-delay: -5s;
      }
      .kf:nth-child(5) {
        bottom: 25%;
        left: 60%;
        color: var(--s);
        animation-delay: -12s;
      }
      @keyframes kd {
        0%,
        100% {
          transform: translateY(0) rotate(0);
          opacity: 0.025;
        }
        50% {
          transform: translateY(-40px) rotate(5deg);
          opacity: 0.05;
        }
      }
      .cd {
        position: fixed;
        width: 80px;
        height: 80px;
        z-index: 2;
        pointer-events: none;
      }
      .cd::before,
      .cd::after {
        content: "";
        position: absolute;
        background: var(--p);
        opacity: 0.15;
      }
      .cd.tl {
        top: 20px;
        left: 20px;
      }
      .cd.tl::before {
        width: 40px;
        height: 1px;
        top: 0;
        left: 0;
      }
      .cd.tl::after {
        width: 1px;
        height: 40px;
        top: 0;
        left: 0;
      }
      .cd.tr {
        top: 20px;
        right: 20px;
      }
      .cd.tr::before {
        width: 40px;
        height: 1px;
        top: 0;
        right: 0;
      }
      .cd.tr::after {
        width: 1px;
        height: 40px;
        top: 0;
        right: 0;
      }
      .cd.bl {
        bottom: 20px;
        left: 20px;
      }
      .cd.bl::before {
        width: 40px;
        height: 1px;
        bottom: 0;
        left: 0;
      }
      .cd.bl::after {
        width: 1px;
        height: 40px;
        bottom: 0;
        left: 0;
      }
      .cd.br {
        bottom: 20px;
        right: 20px;
      }
      .cd.br::before {
        width: 40px;
        height: 1px;
        bottom: 0;
        right: 0;
      }
      .cd.br::after {
        width: 1px;
        height: 40px;
        bottom: 0;
        right: 0;
      }
      .mc {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        padding: 2rem;
        text-align: center;
      }
      .er {
        position: absolute;
        width: clamp(280px, 50vw, 550px);
        height: clamp(280px, 50vw, 550px);
        z-index: -1;
        opacity: 0.15;
        animation: rr 20s linear infinite;
      }
      .er svg {
        width: 100%;
        height: 100%;
      }
      @keyframes rr {
        to {
          transform: rotate(360deg);
        }
      }
      .eri {
        position: absolute;
        width: clamp(220px, 40vw, 440px);
        height: clamp(220px, 40vw, 440px);
        z-index: -1;
        opacity: 0.1;
        animation: rr 15s linear infinite reverse;
      }
      .tw {
        position: relative;
        margin-bottom: 0.5rem;
      }
      .tw::before {
        content: "モニッシュ";
        position: absolute;
        top: -2.5rem;
        left: 50%;
        transform: translateX(-50%);
        font-size: 0.9rem;
        letter-spacing: 0.5em;
        color: var(--p);
        opacity: 0.25;
        font-family: sans-serif;
      }
      .mt {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(3rem, 8vw, 7rem);
        font-weight: 900;
        letter-spacing: 0.12em;
        background: linear-gradient(
          135deg,
          var(--p),
          #fff,
          var(--a),
          var(--s),
          var(--p)
        );
        background-size: 400% 400%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gs 5s ease infinite;
        position: relative;
      }
      .mt::before,
      .mt::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          135deg,
          var(--p),
          #fff,
          var(--a),
          var(--s),
          var(--p)
        );
        background-size: 400% 400%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: gs 5s ease infinite;
      }
      .mt::before {
        animation: g1 4s infinite;
        clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      }
      .mt::after {
        animation: g2 4s infinite;
        clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      }
      @keyframes gs {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @keyframes g1 {
        0%,
        88%,
        100% {
          transform: translate(0);
        }
        90% {
          transform: translate(10px, -3px);
        }
        92% {
          transform: translate(-10px, 3px);
        }
        94% {
          transform: translate(5px, 1px);
        }
      }
      @keyframes g2 {
        0%,
        88%,
        100% {
          transform: translate(0);
        }
        89% {
          transform: translate(-8px, 2px);
        }
        91% {
          transform: translate(8px, -2px);
        }
        93% {
          transform: translate(-4px, 3px);
        }
      }
    </style>
  </head>
  <body>
    <div class="cur" id="cur"></div>
    <div class="curd" id="curd"></div>
    <canvas id="pc"></canvas><canvas id="gc"></canvas>
    <div class="scan"></div>
    <div class="vig"></div>
  </body>
</html>

<script>
const cur=document.getElementById('cur'),curd=document.getElementById('curd');
let mx=0,my=0,cx=0,cy=0;const td=[];
for(let i=0;i<12;i++){const d=document.createElement('div');d.className='curt';d.style.width=d.style.height=(8-i*.5)+'px';document.body.appendChild(d);td.push({el:d,x:0,y:0})}
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;curd.style.left=mx-3+'px';curd.style.top=my-3+'px'});
document.addEventListener('mousedown',()=>cur.classList.add('active'));
document.addEventListener('mouseup',()=>cur.classList.remove('active'));
!function ac(){cx+=(mx-cx)*.12;cy+=(my-cy)*.12;cur.style.left=cx-10+'px';cur.style.top=cy-10+'px';let px=mx,py=my;td.forEach((d,i)=>{d.x+=(px-d.x)*(.3-i*.018);d.y+=(py-d.y)*(.3-i*.018);d.el.style.left=d.x-4+'px';d.el.style.top=d.y-4+'px';d.el.style.opacity=.4-i*.03;px=d.x;py=d.y});requestAnimationFrame(ac)}();

const pc=document.getElementById('pc'),px=pc.getContext('2d');let pts=[];
function rc(){pc.width=innerWidth;pc.height=innerHeight;const g=document.getElementById('gc');g.width=innerWidth;g.height=innerHeight;const c=g.getContext('2d');c.clearRect(0,0,g.width,g.height);c.strokeStyle='rgba(0,240,255,.4)';c.lineWidth=.3;for(let x=0;x<g.width;x+=70){c.beginPath();c.moveTo(x,0);c.lineTo(x,g.height);c.stroke()}for(let y=0;y<g.height;y+=70){c.beginPath();c.moveTo(0,y);c.lineTo(g.width,y);c.stroke()}}
class P{constructor(){this.r()}r(){this.x=Math.random()*pc.width;this.y=Math.random()*pc.height;this.sz=Math.random()*2+.3;this.sx=(Math.random()-.5)*.4;this.sy=(Math.random()-.5)*.4;this.op=Math.random()*.5+.1;this.h=[185,330,275,50][Math.random()*4|0];this.l=Math.random()*250+100;this.ml=this.l}u(){this.x+=this.sx;this.y+=this.sy;this.l--;const dx=mx-this.x,dy=my-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<180){this.x+=dx*.008;this.y+=dy*.008;this.op=Math.min(this.op+.015,.9)}if(this.l<=0||this.x<-10||this.x>pc.width+10||this.y<-10||this.y>pc.height+10)this.r()}d(){const a=this.op*(this.l/this.ml);px.beginPath();px.arc(this.x,this.y,this.sz,0,Math.PI*2);px.fillStyle=`hsla(${this.h},100%,70%,${a})`;px.fill();px.beginPath();px.arc(this.x,this.y,this.sz*4,0,Math.PI*2);px.fillStyle=`hsla(${this.h},100%,70%,${a*.1})`;px.fill()}}
function ip(){pts=Array.from({length:Math.min(140,innerWidth*innerHeight/7000|0)},()=>new P)}
function dc(){for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<110){px.beginPath();px.moveTo(pts[i].x,pts[i].y);px.lineTo(pts[j].x,pts[j].y);px.strokeStyle=`rgba(0,240,255,${(1-d/110)*.06})`;px.lineWidth=.4;px.stroke()}}}
!function ap(){px.clearRect(0,0,pc.width,pc.height);pts.forEach(p=>{p.u();p.d()});dc();requestAnimationFrame(ap)}();
addEventListener('resize',()=>{rc();ip()});rc();ip();

const se=document.getElementById('sub');"COMING SOON".split('').forEach((c,i)=>{const s=document.createElement('span');s.textContent=c===' '?'\u00A0':c;s.style.animationDelay=`${.8+i*.05}s`;se.appendChild(s)});

const tls=['DESIGNER · DEVELOPER · DREAMER','CRAFTING DIGITAL EXPERIENCES','WHERE CODE MEETS CREATIVITY','BUILDING SOMETHING EXTRAORDINARY','PIXEL PERFECT · PERFORMANCE DRIVEN','TURNING IDEAS INTO REALITY'];

const qs=[{t:"A lesson without pain is meaningless. For you cannot gain something without sacrificing something in return.",s:"Fullmetal Alchemist: Brotherhood",c:"Edward Elric"},{t:"The world isn't perfect. But it's there for us, doing the best it can. That's what makes it so damn beautiful.",s:"Fullmetal Alchemist",c:"Roy Mustang"},{t:"If you don't take risks, you can't create a future.",s:"One Piece",c:"Monkey D. Luffy"},{t:"People's lives don't end when they die. It ends when they lose faith.",s:"Naruto Shippuden",c:"Itachi Uchiha"},{t:"Power comes in response to a need, not a desire.",s:"Dragon Ball Z",c:"Goku"},{t:"The only ones who should kill are those prepared to be killed.",s:"Code Geass",c:"Lelouch vi Britannia"},{t:"Whatever you lose, you'll find it again. But what you throw away you'll never get back.",s:"Rurouni Kenshin",c:"Kenshin Himura"},{t:"In this world, wherever there is light, there are also shadows.",s:"Naruto",c:"Madara Uchiha"},{t:"The night is darkest before the dawn. But I promise you, the dawn is coming.",s:"Attack on Titan",c:"Erwin Smith"},{t:"Believing in someone. That's what makes the real thing.",s:"Your Name",c:"Taki Tachibana"}];

const kk=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight'];let ki=0;
document.addEventListener('keydown',e=>{if(e.key===kk[ki]){ki++;if(ki===kk.length){ki=0;const b=document.getElementById('pb');b.style.opacity=1;b.style.animation='none';void b.offsetWidth;b.style.animation='pu 1.5s ease-out forwards';const bi=document.getElementById('pbi');bi.style.animation='none';void bi.offsetWidth;bi.style.animation='be 1.5s ease-out forwards';st('⚡ POWER LEVEL OVER 9000');for(let i=0;i<60;i++){const p=new P;p.x=pc.width/2;p.y=pc.height/2;p.sx=(Math.random()-.5)*10;p.sy=(Math.random()-.5)*10;p.sz=Math.random()*5+2;p.l=150;p.ml=150;pts.push(p)}setTimeout(()=>{b.style.opacity=0},1600)}}else ki=0});

function st(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}

let actx,isp=false,an=null;
document.getElementById('st').addEventListener('click',()=>{const b=document.getElementById('st');if(!isp){actx=new(window.AudioContext||window.webkitAudioContext)();const o1=actx.createOscillator(),o2=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();o1.type='sine';o1.frequency.value=75;o2.type='sine';o2.frequency.value=112;f.type='lowpass';f.frequency.value=180;g.gain.value=0;o1.connect(f);o2.connect(f);f.connect(g);g.connect(actx.destination);o1.start();o2.start();g.gain.linearRampToValueAtTime(.035,actx.currentTime+2);const lfo=actx.createOscillator(),lg=actx.createGain();lfo.frequency.value=.08;lg.gain.value=12;lfo.connect(lg);lg.connect(o1.frequency);lfo.start();an={gain:g};isp=true;b.textContent='♫';b.style.color='var(--p)';b.style.borderColor='var(--p)'}else{if(an){an.gain.gain.linearRampToValueAtTime(0,actx.currentTime+1);setTimeout(()=>{actx.close();isp=false},1100)}b.textContent='♪';b.style.color='';b.style.borderColor=''}});

document.addEventListener('click',e=>{for(let i=0;i<3;i++){const r=document.createElement('div');Object.assign(r.style,{position:'fixed',left:e.clientX+'px',top:e.clientY+'px',width:'4px',height:'4px',borderRadius:'50%',border:'1px solid '+['var(--p)','var(--s)','var(--a)'][i],pointerEvents:'none',zIndex:'9999',transform:'translate(-50%,-50%)',opacity:'0'});document.body.appendChild(r);r.animate([{width:'4px',height:'4px',opacity:.7},{width:(60+i*30)+'px',height:(60+i*30)+'px',opacity:0}],{duration:500+i*150,easing:'ease-out',delay:i*80});setTimeout(()=>r.remove(),800+i*150)}for(let i=0;i<5;i++){const p=new P;p.x=e.clientX;p.y=e.clientY;p.sx=(Math.random()-.5)*5;p.sy=(Math.random()-.5)*5;p.sz=Math.random()*3+1;p.l=50;p.ml=50;pts.push(p)}});
</script>
